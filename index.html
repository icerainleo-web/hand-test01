<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>色彩升級：雙手獨立辨識與顏色區分</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      text-align: center; 
      background: #121212; 
      color: #e0e0e0; 
      margin: 0;
      padding: 10px;
    }
    h1 { font-size: 1.5rem; margin-top: 15px; color: #00ffcc; }
    p { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }
    
    .btn-control {
      background: #00ffcc;
      color: #121212;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,255,204,0.3);
      transition: 0.2s;
    }
    .btn-control:hover { background: #00ccaa; }

    .container { 
      position: relative; 
      width: 100%;       
      max-width: 500px; 
      aspect-ratio: 4 / 3; 
      margin: 0 auto; 
      background: #000;
      border: 2px solid #333;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    #webcam { display: none; }
    
    #canvas { 
      width: 100%; 
      height: 100%; 
      object-fit: cover;
    }
  </style>
</head>
<body>

  <h1>AI 雙手色彩區分與左右手辨識</h1>
  <p>第一隻手為螢光綠，第二隻手為淺紫色。還能自動辨識左右手喔！</p>
  
  <button class="btn-control" id="toggleMirror">切換為：正常模式</button>

  <div class="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const toggleBtn = document.getElementById('toggleMirror');

    // 預設為鏡像模式 (true)
    let isMirror = true;

    // 按鈕點擊事件
    toggleBtn.addEventListener('click', () => {
      isMirror = !isMirror;
      toggleBtn.innerText = isMirror ? "切換為：正常模式" : "切換為：鏡像模式";
    });

    function calculateDistance(point1, point2) {
      const dx = (point1.x - point2.x) * canvasElement.width;
      const dy = (point1.y - point2.y) * canvasElement.height;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function pxToCm(pixelDistance, handLandmarks) {
      const wrist = handLandmarks[0];       
      const middleBase = handLandmarks[9];  
      const handScaleInPx = calculateDistance(wrist, middleBase);
      const avgHandSizeCm = 10; 
      const pxPerCm = handScaleInPx / avgHandSizeCm;
      if (pxPerCm === 0) return 0;
      return pixelDistance / pxPerCm;
    }

    function onResults(results) {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // 1. 處理底層影像的鏡像轉換
      canvasCtx.save();
      if (isMirror) {
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
      }
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.restore(); 

      // 2. 如果有偵測到手
      if (results.multiHandLandmarks && results.multiHandedness) {
        
        // 使用 index 來知道目前正在處理第幾隻手
        results.multiHandLandmarks.forEach((landmarks, index) => {
          
          // 【功能升級】：動態決定這隻手的顏色
          // index 為 0 (第一隻手) 用螢光綠，index 為 1 (第二隻手) 用淺紫色
          const handColor = (index === 0) ? '#00ffcc' : '#d1b3ff';

          // 【功能升級】：抓取 MediaPipe 的左右手資訊
          const handedness = results.multiHandedness[index];
          let handLabel = handedness.label; // 官方會輸出 "Left" 或 "Right"
          
          // 換成親切的中文標籤
          let handLabelChinese = (handLabel === 'Left') ? '左手' : '右手';

          const thumbTip = landmarks[4];   
          const indexFingerTip = landmarks[8]; 

          // 3. 鏡像座標修正
          let thumbX = thumbTip.x * canvasElement.width;
          let indexX = indexFingerTip.x * canvasElement.width;
          
          if (isMirror) {
            thumbX = canvasElement.width - thumbX;
            indexX = canvasElement.width - indexX;
          }

          const thumbY = thumbTip.y * canvasElement.height;
          const indexY = indexFingerTip.y * canvasElement.height;

          // 4. 計算長度
          const distanceInPx = calculateDistance(thumbTip, indexFingerTip);
          const distanceInCm = pxToCm(distanceInPx, landmarks);
          
          // 5. 畫大拇指尖圓圈 (套用動態顏色)
          canvasCtx.beginPath();
          canvasCtx.arc(thumbX, thumbY, 12, 0, 2 * Math.PI);
          canvasCtx.fillStyle = handColor;
          canvasCtx.fill();
          canvasCtx.lineWidth = 3;
          canvasCtx.strokeStyle = '#ffffff';
          canvasCtx.stroke();

          // 6. 畫食指尖圓圈 (套用動態顏色)
          canvasCtx.beginPath();
          canvasCtx.arc(indexX, indexY, 12, 0, 2 * Math.PI);
          canvasCtx.fillStyle = handColor;
          canvasCtx.fill();
          canvasCtx.lineWidth = 3;
          canvasCtx.strokeStyle = '#ffffff';
          canvasCtx.stroke();

          // 7. 畫兩指之間的連線 (套用動態顏色)
          canvasCtx.beginPath();
          canvasCtx.moveTo(thumbX, thumbY);
          canvasCtx.lineTo(indexX, indexY);
          canvasCtx.lineWidth = 4;
          canvasCtx.strokeStyle = handColor;
          canvasCtx.stroke();

          // 8. 計算中線位置並渲染文字
          const midX = (thumbX + indexX) / 2;
          const midY = (thumbY + indexY) / 2;

          canvasCtx.font = 'bold 22px -apple-system, BlinkMacSystemFont, sans-serif';
          canvasCtx.fillStyle = '#ffffff';
          canvasCtx.shadowColor = '#000000';
          canvasCtx.shadowBlur = 6;
          canvasCtx.textAlign = 'center';
          
          // 同時顯示「哪隻手」和「測量公分」
          canvasCtx.fillText(`[${handLabelChinese}] 距離: ${distanceInCm.toFixed(1)} cm`, midX, midY - 15);
          canvasCtx.shadowBlur = 0;
        });
      }
    }

    try {
      const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });
      
      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
      });
      hands.onResults(onResults);

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await hands.send({image: videoElement});
        },
        width: 640,
        height: 480,
        facingMode: 'user'
      });
      camera.start();

    } catch (e) {
      console.error("MediaPipe 初始化失敗: " + e.message);
    }
  </script>
</body>
</html>
