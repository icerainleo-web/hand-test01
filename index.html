<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>終極升級：AI 實時物理公分測量</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      text-align: center; 
      background: #121212; 
      color: #e0e0e0; 
      margin: 0;
      padding: 10px;
    }
    h1 { font-size: 1.5rem; margin-top: 15px; color: #00ffcc; }
    p { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }
    
    .btn-control {
      background: #00ffcc;
      color: #121212;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,255,204,0.3);
      transition: 0.2s;
    }
    .btn-control:hover { background: #00ccaa; }

    .container { 
      position: relative; 
      width: 100%;       
      max-width: 500px; 
      aspect-ratio: 4 / 3; 
      margin: 0 auto; 
      background: #000;
      border: 2px solid #333;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    #webcam { display: none; }
    
    #canvas { 
      width: 100%; 
      height: 100%; 
      object-fit: cover;
    }
  </style>
</head>
<body>

  <h1>AI 實時物理公分測量</h1>
  <p>利用個人手掌當動態比例尺，請試著張開與捏合拇指與食指！</p>
  
  <button class="btn-control" id="toggleMirror">切換為：正常模式</button>

  <div class="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const toggleBtn = document.getElementById('toggleMirror');

    // 預設為鏡像模式 (true)
    let isMirror = true;

    // 按鈕點擊事件
    toggleBtn.addEventListener('click', () => {
      isMirror = !isMirror;
      toggleBtn.innerText = isMirror ? "切換為：正常模式" : "切換為：鏡像模式";
    });

    // 計算平面兩點像素距離的函式
    function calculateDistance(point1, point2) {
      const dx = (point1.x - point2.x) * canvasElement.width;
      const dy = (point1.y - point2.y) * canvasElement.height;
      return Math.sqrt(dx * dx + dy * dy);
    }

    /* 核心演算法：將像素距離轉換成物理公分 
      利用手腕(點0)到中指根部(點9)的像素長度，來當作「動態比例尺」
    */
    function pxToCm(pixelDistance, handLandmarks) {
      const wrist = handLandmarks[0];       // 點 0: 手腕
      const middleBase = handLandmarks[9];  // 點 9: 中指根部
      
      // 計算目前手掌在畫面上的像素大小
      const handScaleInPx = calculateDistance(wrist, middleBase);
      
      // 根據統計，成年人手腕到中指根部的物理長度大約是 10 公分
      const avgHandSizeCm = 10; 
      
      // 計算目前環境下的「每公分換算像素（px/cm）」
      const pxPerCm = handScaleInPx / avgHandSizeCm;
      
      // 如果防呆機制被觸發（避免除以零），給予預設值
      if (pxPerCm === 0) return 0;
      
      // 轉換出實時的物理公分
      return pixelDistance / pxPerCm;
    }

    function onResults(results) {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // 1. 處理底層影像的鏡像轉換
      canvasCtx.save();
      if (isMirror) {
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
      }
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.restore(); // 恢復畫布矩陣，確保後續文字絕不反轉

      if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
          
          const thumbTip = landmarks[4];   // 拇指尖
          const indexFingerTip = landmarks[8]; // 食指尖

          // 2. 座標修正：如果是鏡像模式，畫畫點的 X 座標要用 (畫布寬度 - 點座標) 反轉回來
          let thumbX = thumbTip.x * canvasElement.width;
          let indexX = indexFingerTip.x * canvasElement.width;
          
          if (isMirror) {
            thumbX = canvasElement.width - thumbX;
            indexX = canvasElement.width - indexX;
          }

          const thumbY = thumbTip.y * canvasElement.height;
          const indexY = indexFingerTip.y * canvasElement.height;

          // 3. 計算像素長度與物理公分
          const distanceInPx = calculateDistance(thumbTip, indexFingerTip);
          const distanceInCm = pxToCm(distanceInPx, landmarks);
          
          // 4. 畫大拇指尖圓圈
          canvasCtx.beginPath();
          canvasCtx.arc(thumbX, thumbY, 12, 0, 2 * Math.PI);
          canvasCtx.fillStyle = '#00ffcc';
          canvasCtx.fill();
          canvasCtx.lineWidth = 3;
          canvasCtx.strokeStyle = '#ffffff';
          canvasCtx.stroke();

          // 5. 畫食指尖圓圈
          canvasCtx.beginPath();
          canvasCtx.arc(indexX, indexY, 12, 0, 2 * Math.PI);
          canvasCtx.fillStyle = '#00ffcc';
          canvasCtx.fill();
          canvasCtx.lineWidth = 3;
          canvasCtx.strokeStyle = '#ffffff';
          canvasCtx.stroke();

          // 6. 畫兩指之間的連線
          canvasCtx.beginPath();
          canvasCtx.moveTo(thumbX, thumbY);
          canvasCtx.lineTo(indexX, indexY);
          canvasCtx.lineWidth = 4;
          canvasCtx.strokeStyle = '#00ffcc';
          canvasCtx.stroke();

          // 7. 計算兩點中線位置，並渲染出完美的公分文字
          const midX = (thumbX + indexX) / 2;
          const midY = (thumbY + indexY) / 2;

          canvasCtx.font = 'bold 24px -apple-system, BlinkMacSystemFont, sans-serif';
          canvasCtx.fillStyle = '#ffffff';
          canvasCtx.shadowColor = '#000000';
          canvasCtx.shadowBlur = 6;
          canvasCtx.textAlign = 'center';
          
          // distanceInCm.toFixed(1) 保留到小數點後第一位
          canvasCtx.fillText(`距離: ${distanceInCm.toFixed(1)} cm`, midX, midY - 15);
          canvasCtx.shadowBlur = 0;
        }
      }
    }

    try {
      const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });
      
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
      });
      hands.onResults(onResults);

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await hands.send({image: videoElement});
        },
        width: 640,
        height: 480,
        facingMode: 'user'
      });
      camera.start();

    } catch (e) {
      console.error("MediaPipe 初始化失敗: " + e.message);
    }
  </script>
</body>
</html>
