<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>終極修正：文字正向與鏡像控制</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      text-align: center; 
      background: #121212; 
      color: #e0e0e0; 
      margin: 0;
      padding: 10px;
    }
    h1 { font-size: 1.5rem; margin-top: 15px; color: #00ffcc; }
    
    .btn-control {
      background: #00ffcc;
      color: #121212;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,255,204,0.3);
      transition: 0.2s;
    }
    .btn-control:hover { background: #00ccaa; }

    .container { 
      position: relative; 
      width: 100%;       
      max-width: 500px; 
      aspect-ratio: 4 / 3; 
      margin: 0 auto; 
      background: #000;
      border: 2px solid #333;
      border-radius: 12px;
      overflow: hidden;
    }
    
    #webcam { display: none; }
    
    /* 移除之前的 CSS 翻轉，改由 JS 繪圖控制，確保文字永遠不反轉 */
    #canvas { 
      width: 100%; 
      height: 100%; 
      object-fit: cover;
    }
  </style>
</head>
<body>

  <h1>拇指與食指距離測量</h1>
  
  <button class="btn-control" id="toggleMirror">切換為：正常模式</button>

  <div class="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const toggleBtn = document.getElementById('toggleMirror');

    // 預設為鏡像模式 (true)
    let isMirror = true;

    // 按鈕點擊事件：切換鏡像狀態
    toggleBtn.addEventListener('click', () => {
      isMirror = !isMirror;
      toggleBtn.innerText = isMirror ? "切換為：正常模式" : "切換為：鏡像模式";
    });

    function calculateDistance(point1, point2) {
      const dx = (point1.x - point2.x) * canvasElement.width;
      const dy = (point1.y - point2.y) * canvasElement.height;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function onResults(results) {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // 保存目前的畫布狀態
      canvasCtx.save();

      // 如果是鏡像模式，我們只翻轉「底層影像」的繪製矩陣
      if (isMirror) {
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
      }
      
      // 畫上鏡頭影像
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      // 影像畫完後，立刻恢復畫布矩陣，這樣後續畫的「文字」就不會被倒反！
      canvasCtx.restore();

      if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
          
          const thumbTip = landmarks[4];  
          const indexFingerTip = landmarks[8]; 

          // 核心數學修正：如果是鏡像模式，畫畫點的 X 座標要用 (總寬度 - 點座標) 反轉回來
          let thumbX = thumbTip.x * canvasElement.width;
          let indexX = indexFingerTip.x * canvasElement.width;
          
          if (isMirror) {
            thumbX = canvasElement.width - thumbX;
            indexX = canvasElement.width - indexX;
          }

          const thumbY = thumbTip.y * canvasElement.height;
          const indexY = indexFingerTip.y * canvasElement.height;

          const distance = calculateDistance(thumbTip, indexFingerTip);
          
          // 畫大拇指尖
          canvasCtx.beginPath();
          canvasCtx.arc(thumbX, thumbY, 12, 0, 2 * Math.PI);
          canvasCtx.fillStyle = '#00ffcc';
          canvasCtx.fill();
          canvasCtx.lineWidth = 3;
          canvasCtx.strokeStyle = '#ffffff';
          canvasCtx.stroke();

          // 畫食指尖
          canvasCtx.beginPath();
          canvasCtx.arc(indexX, indexY, 12, 0, 2 * Math.PI);
          canvasCtx.fillStyle = '#00ffcc';
          canvasCtx.fill();
          canvasCtx.lineWidth = 3;
          canvasCtx.strokeStyle = '#ffffff';
          canvasCtx.stroke();

          // 畫兩指連線
          canvasCtx.beginPath();
          canvasCtx.moveTo(thumbX, thumbY);
          canvasCtx.lineTo(indexX, indexY);
          canvasCtx.lineWidth = 4;
          canvasCtx.strokeStyle = '#00ffcc';
          canvasCtx.stroke();

          // 計算中點，並寫上「正向、未倒反」的完美文字
          const midX = (thumbX + indexX) / 2;
          const midY = (thumbY + indexY) / 2;

          canvasCtx.font = 'bold 24px -apple-system, BlinkMacSystemFont, sans-serif';
          canvasCtx.fillStyle = '#ffffff';
          canvasCtx.shadowColor = '#000000';
          canvasCtx.shadowBlur = 6;
          
          // 文字置中對齊線段
          canvasCtx.textAlign = 'center';
          canvasCtx.fillText(`距離: ${distance.toFixed(0)} px`, midX, midY - 15);
          canvasCtx.shadowBlur = 0;
        }
      }
    }

    try {
      const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });
      
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
      });
      hands.onResults(onResults);

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await hands.send({image: videoElement});
        },
        width: 640,
        height: 480,
        facingMode: 'user'
      });
      camera.start();

    } catch (e) {
      console.error("MediaPipe 初始化失敗: " + e.message);
    }
  </script>
</body>
</html>
